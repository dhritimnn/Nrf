  <link rel="icon" href="img/profile.png" type="image/png">
  
  <!-- Canonical -->
  <link rel="canonical" href="https://bnrf.vercel
  app/">
  
  <!-- Structured Data -->
  <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "Bajali New Rays Foundation",
      "foundingDate": "2024",
      "url": "https://bnrf.vercel.app/",
      "logo": "https://bnrf.vercel.app/img/profile.png",

        "@type": "PostalAddress",

      --color-brand-700: #0F5A76;
      --color-brand-600: #11475E;
      --color-brand-400: #2DA5D4;

  <div id="blurpad" class="fixed inset-0 backdrop-blur-md bg-black/20 opacity-0 pointer-events-none transition-opacity duration-[400ms] z-40"></div>

  <!-- PAGE HEADER -->
  <section class="w-full bg-gradient-to-br from-brand-600 via-brand-700 to-brand-900 py-14 flex flex-col items-center gap-2">
    <h1 class="text-white text-4xl font-extrabold tracking-tight">Image Gallery</h1>
    <div class="h-1 w-20 bg-accent mt-2"></div>
  </section>

  <main class="w-full bg-blue-50 px-4 py-10">

      <!-- Populated by JS -->
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox">

    <!-- Top bar -->
    <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-5 py-4 z-10">
      <button id="lb-back" class="flex items-center gap-2 text-white/80 hover:text-white transition-colors text-sm">
        <i class="bi bi-arrow-left text-xl"></i>
        <span>Back</span>
      </button>
      <span id="lb-counter" class="text-white/40 text-xs tracking-widest"></span>
      <button id="lb-close" class="text-white/60 hover:text-white transition-colors">
        <i class="bi bi-x-lg text-2xl"></i>
      </button>
    </div>

    <!-- Image -->
    <img id="lb-img" src="" alt="Bajali New Rays Foundation">

    <p id="lb-caption" class="text-white/50 text-xs tracking-wide mt-4 text-center px-6"></p>

    <button id="lb-prev" class="absolute left-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors focus:outline-none">

    <button id="lb-next" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors focus:outline-none">
